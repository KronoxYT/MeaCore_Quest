name: Build MeaCore Quest

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.7.0

jobs:
  build:
    strategy:
      matrix:
        platform: [windows, linux, android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 (Required for Android Export)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK (Required for Android Export)
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Setup Godot
        uses: chickensoft/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-double-precision: false
          no-templates: false

      - name: Export ${{ matrix.platform }}
        run: |
          mkdir -p build/${{ matrix.platform }}
          case "${{ matrix.platform }}" in
            windows)
              godot --headless --export-release "Windows Desktop" build/windows/MeaCoreQuest.exe
              ;;
            linux)
              godot --headless --export-release "Linux Desktop" build/linux/MeaCoreQuest.x86_64
              ;;
            android)
              # Godot busca las variables de entorno de Android SDK
              export ANDROID_HOME=$ANDROID_SDK_ROOT
              godot --headless --export-release "Android" build/android/MeaCoreQuest.apk
              ;;
          esac

      - name: Upload artifact - ${{ matrix.platform }}
        uses: actions/upload-artifact@v4
        with:
          name: MeaCoreQuest-${{ matrix.platform }}
          path: build/${{ matrix.platform }}/
          retention-days: 30
